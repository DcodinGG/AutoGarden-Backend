<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoGarden — Smart Irrigation</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --card-hover: #1e293b;
      --border: #334155;
      --primary: #10b981;
      --primary-glow: rgba(16, 185, 129, 0.2);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --warning: #f59e0b;
      --font-ui: 'Inter', sans-serif;
      --font-heading: 'Fraunces', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: fixed; top: -10%; left: -10%;
      width: 40%; height: 40%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
      pointer-events: none; z-index: -1;
    }

    /* ── Header ── */
    header {
      backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .logo span { color: var(--primary); }
    .logo i { color: var(--primary); }

    .status-group {
      display: flex; gap: 1.5rem;
      font-size: 0.75rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-item { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
    .dot.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
    .dot.warn { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
    .dot.error { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

    /* ── Layout ── */
    main {
      max-width: 1200px; margin: 0 auto;
      padding: 2rem;
      display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem;
    }

    .col-span-12 { grid-column: span 12; }
    .col-span-8 { grid-column: span 8; }
    .col-span-4 { grid-column: span 4; }

    /* ── Components ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      position: relative;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card-title {
      font-family: var(--font-heading);
      font-size: 1.25rem; font-weight: 700;
      margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;
    }
    .card-title i { color: var(--primary); width: 20px; }

    /* ── Plants Grid ── */
    .plants-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem;
    }

    .plant-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plant-item:hover {
      border-color: var(--primary);
      background: rgba(16, 185, 129, 0.03);
      transform: translateY(-2px);
    }
    .plant-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .plant-id { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .plant-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .plant-species { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-bottom: 1rem; }

    .moisture-viz { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .progress-track { flex: 1; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .moisture-pct { font-weight: 700; font-size: 0.9rem; color: var(--primary); min-width: 35px; }

    .last-activity { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; background: var(--primary-glow); color: var(--primary); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1rem; border-radius: 0.5rem;
      font-weight: 600; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
      font-family: var(--font-ui);
    }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { background: #34d399; transform: scale(1.02); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }
    .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.75rem; }

    /* ── Table ── */
    .table-container { overflow-x: auto; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; }
    td { padding: 1rem; border-bottom: 1px solid rgba(51, 65, 85, 0.5); font-size: 0.85rem; }
    tr:hover td { background: rgba(255,255,255,0.01); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(8px); z-index: 200;
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-backdrop.active { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 1.5rem; width: 100%; max-width: 500px;
      padding: 2rem; animation: modalIn 0.3s ease-out;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .input-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
    input, textarea {
      width: 100%; background: #020617; border: 1px solid var(--border);
      border-radius: 0.5rem; padding: 0.75rem; color: var(--text);
      font-family: var(--font-ui); outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--primary); }

    /* ── Analytics ── */
    .chart-container { height: 300px; margin-top: 1rem; }

    @media (max-width: 1024px) {
      .col-span-8, .col-span-4 { grid-column: span 12; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <i data-lucide="sprout"></i>
      Auto<span>Garden</span>
    </div>
    <div class="status-group">
      <div class="status-item"><div id="dot-mqtt" class="dot"></div> MQTT</div>
      <div class="status-item"><div id="dot-ai" class="dot"></div> Claude AI</div>
      <div class="status-item"><div id="dot-wx" class="dot"></div> Weather</div>
      <div class="status-item" id="uptime" style="color: var(--text); opacity: 0.8;">--:--</div>
    </div>
  </header>

  <main>
    <!-- Moisture Analytics -->
    <div class="card col-span-8">
      <div class="card-title"><i data-lucide="line-chart"></i> Moisture Trends</div>
      <div class="chart-container">
        <canvas id="moistureChart"></canvas>
      </div>
    </div>

    <!-- Weather Stats -->
    <div class="card col-span-4" id="weather-card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
        <div class="card-title" style="margin-bottom:0;"><i data-lucide="cloud-sun"></i> Local Weather</div>
        <button class="btn btn-outline btn-sm" id="btn-refresh-wx" onclick="refreshWeather()">
          <i data-lucide="refresh-cw"></i>
        </button>
      </div>
      <div id="weather-info" style="display:flex; flex-direction:column; gap:1rem;">
        <div style="font-size: 2rem; font-weight: 700; font-family: var(--font-heading);" id="wx-temp">--°C</div>
        <div id="wx-desc" style="color: var(--text-muted); text-transform: capitalize;">--</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
          <div>
            <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">RAIN 24H</div>
            <div id="wx-rain">-- mm</div>
          </div>
          <div>
            <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">HUMIDITY</div>
            <div id="wx-hum">--%</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Plants Control -->
    <div class="card col-span-12">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
        <div class="card-title" style="margin-bottom:0;"><i data-lucide="layout-grid"></i> Configured Pots</div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <i data-lucide="plus"></i> Add New Pot
        </button>
      </div>
      <div id="plants-grid" class="plants-grid">
        <!-- Plants will be injected here -->
      </div>
    </div>

    <!-- Recent History -->
    <div class="card col-span-12">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
        <div class="card-title" style="margin-bottom:0;"><i data-lucide="history"></i> Decision History</div>
        <button class="btn btn-outline btn-sm" onclick="loadHistory()">
          <i data-lucide="refresh-cw"></i> Refresh
        </button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Plant</th>
              <th>Moisture</th>
              <th>Status</th>
              <th>AI Reasoning</th>
              <th>Confidence</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <!-- History rows -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h2 id="modal-title" style="font-family: var(--font-heading); margin-bottom: 1.5rem;">Add New Pot</h2>
      <input type="hidden" id="form-id">
      <div class="input-group">
        <label>Pot ID (ESP32 Mapping)</label>
        <input type="number" id="form-plant-id" placeholder="1">
      </div>
      <div class="input-group">
        <label>Plant Name</label>
        <input type="text" id="form-name" placeholder="Cherry Tomato">
      </div>
      <div class="input-group">
        <label>Botanical Species</label>
        <input type="text" id="form-species" placeholder="Solanum lycopersicum">
      </div>
      <div class="input-group">
        <label>Notes</label>
        <textarea id="form-notes" rows="3"></textarea>
      </div>
      <div style="display:flex; gap:1rem; justify-content:flex-end; margin-top: 2rem;">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="savePlant()">Save Configuration</button>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const api = {
      get:    (url) => fetch(url).then(r => r.json()),
      put:    (url, data) => fetch(url, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) }).then(r => r.json()),
      delete: (url) => fetch(url, { method:'DELETE' }).then(r => r.json()),
    };

    let plants = [];
    let history = [];
    let chart = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await loadStatus();
      await loadPlants();
      await loadHistory();
      initChart();
      setInterval(loadHistory, 30000);
      setInterval(loadStatus, 15000);
    });

    async function loadStatus() {
      try {
        const s = await api.get('/api/status');
        setDot('dot-mqtt', s.mqtt_configured);
        setDot('dot-ai',   s.ai_configured);
        setDot('dot-wx',   s.weather_configured);
        document.getElementById('uptime').innerHTML = `<i data-lucide="clock" style="width:12px; height:12px; vertical-align:middle; margin-right:4px;"></i> ${formatUptime(s.uptime_s)}`;
        lucide.createIcons();
      } catch { setDot('dot-mqtt', false, true); }
    }

    function setDot(id, active, error = false) {
      const el = document.getElementById(id);
      el.className = 'dot ' + (error ? 'error' : (active ? 'active' : 'warn'));
    }

    function formatUptime(s) {
      if (s < 60) return `${s}s`;
      if (s < 3600) return `${Math.floor(s/60)}m`;
      return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
    }

    async function loadPlants() {
      plants = await api.get('/api/plants');
      renderPlants();
    }

    function renderPlants() {
      const grid = document.getElementById('plants-grid');
      const lastByPlant = {};
      history.forEach(h => { if (!lastByPlant[h.plant_id]) lastByPlant[h.plant_id] = h; });

      if (plants.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-muted); grid-column: 1/-1; text-align:center; padding: 3rem;">No plants configured yet.</div>';
        return;
      }

      grid.innerHTML = plants.map(p => {
        const last = lastByPlant[p.id];
        const moisture = last?.moisture_pct ?? 0;
        const watered = last?.watered;
        
        return `
          <div class="plant-item" onclick="openEditModal(${p.id})">
            <div class="plant-header">
              <span class="plant-id">Pot #${p.id}</span>
              <div style="display:flex; gap:0.5rem;">
                <button class="btn btn-sm btn-outline btn-danger" onclick="event.stopPropagation(); deletePlantConfirm(${p.id})">
                  <i data-lucide="trash-2" style="width:14px;"></i>
                </button>
              </div>
            </div>
            <div class="plant-name">${p.name}</div>
            <div class="plant-species">${p.species || 'Common species'}</div>
            
            <div class="moisture-viz">
              <div class="progress-track"><div class="progress-fill" style="width:${moisture}%"></div></div>
              <span class="moisture-pct">${moisture}%</span>
            </div>

            <div class="last-activity">
              <i data-lucide="activity" style="width:12px;"></i>
              ${last ? `Last: ${formatDateShort(last.recorded_at)}` : 'No data yet'}
              ${watered ? `<span class="badge">WATERED ${last.water_secs}s</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function loadHistory() {
      history = await api.get('/api/history?limit=50');
      renderHistory();
      renderPlants();
      updateChart();
      updateWeather();
    }

    function renderHistory() {
      const tbody = document.getElementById('history-body');
      tbody.innerHTML = history.slice(0, 10).map(h => {
        let dec = {}; try { dec = JSON.parse(h.ai_decision); } catch {}
        return `
          <tr>
            <td style="color:var(--text-muted)">${formatDateShort(h.recorded_at)}</td>
            <td style="font-weight:600">${h.plant_name || `#${h.plant_id}`}</td>
            <td>
              <span style="color: ${h.moisture_pct < 30 ? 'var(--danger)' : 'var(--primary)'}">${h.moisture_pct}%</span>
            </td>
            <td>
              ${h.watered ? '<span style="color:var(--primary); font-weight:700;">✓ Watered</span>' : '<span style="color:var(--text-muted)">Skipped</span>'}
            </td>
            <td style="font-size:0.75rem; max-width: 300px; color:var(--text-muted)">${dec.reasoning || '---'}</td>
            <td>
              <span class="badge" style="background: ${dec.confidence === 'high' ? 'rgba(16,185,129,0.1)' : 'rgba(245,158,11,0.1)'}; color: ${dec.confidence === 'high' ? 'var(--primary)' : 'var(--warning)'}">${dec.confidence || '---'}</span>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function updateWeather() {
      try {
        const wx = await api.get('/api/weather');
        if (wx.error) return;
        document.getElementById('wx-temp').textContent = wx.temp + '°C';
        document.getElementById('wx-desc').textContent = wx.description;
        document.getElementById('wx-rain').textContent = wx.rain_next24h + ' mm';
        document.getElementById('wx-hum').textContent = (wx.humidity || '--') + '%';
      } catch (err) { console.error('Weather update failed', err); }
    }

    async function refreshWeather() {
      const btn = document.getElementById('btn-refresh-wx');
      btn.style.animation = 'spin 1s linear infinite';
      try {
        await fetch('/api/weather/refresh', { method: 'POST' });
        await updateWeather();
      } finally {
        btn.style.animation = '';
      }
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Add New Pot';
      document.getElementById('form-plant-id').value = '';
      document.getElementById('form-plant-id').disabled = false;
      document.getElementById('form-name').value = '';
      document.getElementById('form-species').value = '';
      document.getElementById('form-notes').value = '';
      document.getElementById('modal-backdrop').classList.add('active');
    }

    function openEditModal(id) {
      const p = plants.find(x => x.id === id);
      if (!p) return;
      editingId = id;
      document.getElementById('modal-title').textContent = 'Edit Pot #' + id;
      document.getElementById('form-plant-id').value = p.id;
      document.getElementById('form-plant-id').disabled = true;
      document.getElementById('form-name').value = p.name;
      document.getElementById('form-species').value = p.species || '';
      document.getElementById('form-notes').value = p.notes || '';
      document.getElementById('modal-backdrop').classList.add('active');
    }

    function closeModal() { document.getElementById('modal-backdrop').classList.remove('active'); }

    async function savePlant() {
      const id = parseInt(document.getElementById('form-plant-id').value);
      const name = document.getElementById('form-name').value.trim();
      const species = document.getElementById('form-species').value.trim();
      const notes = document.getElementById('form-notes').value.trim();
      if (!id || !name) return alert('ID and Name are required');
      await api.put(`/api/plants/${id}`, { name, species, notes });
      closeModal();
      loadPlants();
    }

    async function deletePlantConfirm(id) {
      if (!confirm('Are you sure you want to delete this pot?')) return;
      await api.delete(`/api/plants/${id}`);
      loadPlants();
    }

    function initChart() {
      const ctx = document.getElementById('moistureChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: true, position: 'bottom', labels: { color: '#94a3b8', font: { family: 'Inter' } } } },
          scales: {
            x: { ticks: { color: '#64748b' }, grid: { display: false } },
            y: { min: 0, max: 100, ticks: { color: '#64748b' }, grid: { color: 'rgba(51, 65, 85, 0.3)' } }
          },
          elements: { line: { tension: 0.4 }, point: { radius: 0 } }
        }
      });
    }

    function updateChart() {
      if (!chart) return;
      const dataByPlant = {};
      const labels = [...new Set(history.map(h => formatDateLabel(h.recorded_at)))].reverse();
      
      plants.forEach((p, i) => {
        const plantHistory = history.filter(h => h.plant_id === p.id).reverse();
        dataByPlant[p.id] = labels.map(l => {
          const entry = plantHistory.find(h => formatDateLabel(h.recorded_at) === l);
          return entry ? entry.moisture_pct : null;
        });
      });

      const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6'];
      chart.data.labels = labels;
      chart.data.datasets = plants.map((p, i) => ({
        label: p.name,
        data: dataByPlant[p.id],
        borderColor: colors[i % colors.length],
        borderWidth: 2,
        fill: false
      }));
      chart.update('none');
    }

    function formatDateShort(iso) {
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    function formatDateLabel(iso) {
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      return d.getHours() + ':' + (d.getMinutes()<10?'0':'') + d.getMinutes();
    }
  </script>
</body>
</html>
